---
- name: Launch demo job template
  hosts: local
  gather_facts: false
  vars_files:
    - ../../vars/awx_resources.yml
  vars:
    awx_launch_wait: true

  pre_tasks:
    - name: Validate required AWX connection variables
      ansible.builtin.assert:
        that:
          - awx_host | length > 0
          - awx_oauth_token | length > 0
          - awx_job_template_name | length > 0
        fail_msg: "Set AWX_HOST, AWX_OAUTH_TOKEN, and awx_job_template_name"

    - name: Set AWX API headers
      ansible.builtin.set_fact:
        awx_api_headers:
          Authorization: "Bearer {{ awx_oauth_token | trim }}"
          Content-Type: application/json

    - name: Build job template lookup URL
      ansible.builtin.set_fact:
        awx_jt_lookup_url: >-
          {{ awx_host }}/api/v2/job_templates/?name={{ awx_job_template_name | urlencode }}{% if awx_org_id is defined %}&organization={{ awx_org_id | int }}{% endif %}

  tasks:
    - name: Lookup job template
      ansible.builtin.uri:
        url: "{{ awx_jt_lookup_url }}"
        method: GET
        headers: "{{ awx_api_headers }}"
        validate_certs: "{{ awx_validate_certs }}"
        status_code: 200
      register: jt_lookup

    - name: Fail when job template is not found
      ansible.builtin.fail:
        msg: >-
          Job template '{{ awx_job_template_name }}' not found.
          Lookup URL: {{ awx_jt_lookup_url }}
      when: (jt_lookup.json.count | int) == 0

    - name: Launch job template
      ansible.builtin.uri:
        url: "{{ awx_host }}/api/v2/job_templates/{{ jt_lookup.json.results[0].id }}/launch/"
        method: POST
        headers: "{{ awx_api_headers }}"
        validate_certs: "{{ awx_validate_certs }}"
        body_format: json
        body: {}
        status_code:
          - 201
          - 202
      register: launch_result

    - name: Set launched job id
      ansible.builtin.set_fact:
        awx_launched_job_id: "{{ launch_result.json.job | default(launch_result.json.id) }}"

    - name: Wait for launched job completion
      ansible.builtin.uri:
        url: "{{ awx_host }}/api/v2/jobs/{{ awx_launched_job_id }}/"
        method: GET
        headers: "{{ awx_api_headers }}"
        validate_certs: "{{ awx_validate_certs }}"
        status_code: 200
      register: launched_job
      until: launched_job.json.status not in ['new', 'pending', 'waiting', 'running']
      retries: 120
      delay: 2
      when: awx_launch_wait | bool

    - name: Show launch result summary
      ansible.builtin.debug:
        msg:
          job_template_id: "{{ jt_lookup.json.results[0].id }}"
          launched_job_id: "{{ awx_launched_job_id }}"
          status: "{{ (launched_job.json.status if (launched_job is defined and launched_job.json is defined) else 'launched') }}"
          finished: "{{ (launched_job.json.finished if (launched_job is defined and launched_job.json is defined) else 'n/a') }}"
