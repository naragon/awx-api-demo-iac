---
- name: Bootstrap AWX resources for API demo
  hosts: local
  gather_facts: false
  vars_files:
    - ../../vars/awx_resources.yml
  collections:
    - awx.awx

  pre_tasks:
    - name: Validate required AWX connection variables
      ansible.builtin.assert:
        that:
          - awx_host | length > 0
          - awx_oauth_token | length > 0
          - awx_project_scm_url | length > 0
        fail_msg: "Set AWX_HOST, AWX_OAUTH_TOKEN, and awx_project_scm_url (or use inventories/group_vars/all/awx.yml)"

  tasks:
    - name: Create organization
      awx.awx.organization:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: "{{ awx_org_name }}"
        state: present

    - name: Create execution environment
      awx.awx.execution_environment:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: "{{ awx_execution_environment_name }}"
        image: "{{ awx_execution_environment_image }}"
        organization: "{{ awx_org_name }}"
        pull: always
        state: present

    - name: Create project (SCM)
      awx.awx.project:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: "{{ awx_project_name }}"
        description: "{{ awx_project_description }}"
        organization: "{{ awx_org_name }}"
        scm_type: git
        scm_url: "{{ awx_project_scm_url }}"
        scm_branch: "{{ awx_project_scm_branch }}"
        scm_update_on_launch: true
        wait: true
        state: present

    - name: Create inventory
      awx.awx.inventory:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: "{{ awx_inventory_name }}"
        description: "{{ awx_inventory_description }}"
        organization: "{{ awx_org_name }}"
        state: present

    - name: Add localhost host to inventory
      awx.awx.host:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: localhost
        inventory: "{{ awx_inventory_name }}"
        enabled: true
        variables:
          ansible_connection: local
        state: present

    - name: Create job template
      awx.awx.job_template:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: "{{ awx_job_template_name }}"
        description: "{{ awx_job_template_description }}"
        organization: "{{ awx_org_name }}"
        project: "{{ awx_project_name }}"
        inventory: "{{ awx_inventory_name }}"
        playbook: "{{ awx_job_template_playbook }}"
        execution_environment: "{{ awx_execution_environment_name }}"
        ask_variables_on_launch: false
        state: present

    - name: Force project sync once after create/update
      awx.awx.project_update:
        controller_host: "{{ awx_host }}"
        controller_oauthtoken: "{{ awx_oauth_token }}"
        validate_certs: "{{ awx_validate_certs }}"
        name: "{{ awx_project_name }}"
        organization: "{{ awx_org_name }}"
        wait: true
